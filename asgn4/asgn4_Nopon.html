<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Change a point color</title>
  </head>

  <body onload="main()">
    <canvas id="webgl" width="400" height="400">
    Please use a browser that supports "canvas"
    </canvas>
    <p>

    <p id="numdot"> XXX </p>

    <button type="Normal" id="normalOn">Normal On</button>
    <button type="Normal" id="normalOff">Normal Off</button>
    <p>
    <button type="Normal" id="lightOn">ON</button>
    <button type="Normal" id="lightOff">OFF</button>
    <p>
    Light X <input type="range" min="-250" max="250" value="0" class="slider" id="lightSlideX">
    Light Y <input type="range" min="-250" max="250" value="100" class="slider" id="lightSlideY">
    Light Z <input type="range" min="-250" max="250" value="-200" class="slider" id="lightSlideZ">
    <p>
    Red <input type="range" min="-45" max="45" value="0" class="slider" id="redSlide">
    Animation:
    </p>
    Magenta <input type="range" min="-45" max="45" value="0" class="slider" id="magentaSlide">
    Animation:
    <button type="button" id="magentaAnimOn">ON</button>
    <button type="button" id="magentaAnimOff">OFF</button>
    <p>
    </p>
    Yellow <input type="range" min="-45" max="45" value="0" class="slider" id="yellowSlide">
    Animation:
    <button type="button" id="yellowAnimOn">ON</button>
    <button type="button" id="yellowAnimOff">OFF</button>
    <p>
    Camera Angle <input type="range" min="0" max="360" value="5" class="slider" id="angleSlide">
    </p> 
    
    <!---
    <p>
    Red <input type="range" min="0" max="100" value="100" class="slider" id="redSlide">
    </p><p>
    Green <input type="range" min="0" max="100" value="0" class="slider" id="greenSlide">
    </p><p>
    Blue <input type="range" min="0" max="100" value="0" class="slider" id="blueSlide">
    </p><p>
    Size <input type="range" min="5" max="200" value="100" class="slider" id="sizeSlide">
    </p></p>
  -->

    <script src="lib/webgl-utils.js"></script>
    <script src="lib/webgl-debug.js"></script>
    <script src="lib/cuon-utils.js"></script>
    <script src="lib/cuon-matrix.js"></script>
    <script src="Triangle.js"></script>
    <script src="Circle.js"></script>
    <script src="Koco.js"></script>
    <script src="Point.js"></script>
    <script src="Cube.js"></script>
    <script src="Sphere.js"></script>
    <script src="Camera.js"></script>
    <script src="Nopon.js"></script>
    <script src="asg4.js"></script>
  </body>
</html>
